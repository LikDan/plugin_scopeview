<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>

  <!-- View tabs (multiple panes) -->
  <rect x="5"  y="6" width="9" height="5" rx="2.5" fill="white"/>
  <rect x="16" y="6" width="9" height="5" rx="2.5" fill="white" opacity="0.4"/>
  <rect x="27" y="6" width="8" height="5" rx="2.5" fill="white" opacity="0.4"/>

  <!-- Tab separator -->
  <rect x="5" y="12.5" width="30" height="0.75" rx="0.375" fill="white" opacity="0.2"/>

  <!-- Tree row 1 — folder (yellow) -->
  <rect x="5"  y="16" width="4" height="3.5" rx="1" fill="#FFC94D"/>
  <rect x="11" y="16.75" width="17" height="2" rx="1" fill="white"/>

  <!-- Tree row 2 — file (dimmed) -->
  <circle cx="7" cy="23.5" r="1.5" fill="white" opacity="0.45"/>
  <rect x="11" y="22.5" width="13" height="2" rx="1" fill="white" opacity="0.6"/>

  <!-- Tree row 3 — file highlighted (yellow, in-scope) -->
  <circle cx="7" cy="29" r="1.5" fill="#FFC94D"/>
  <rect x="11" y="28" width="16" height="2" rx="1" fill="white"/>

  <!-- Tree row 4 — file (dimmed) -->
  <circle cx="7" cy="34.5" r="1.5" fill="white" opacity="0.45"/>
  <rect x="11" y="33.5" width="11" height="2" rx="1" fill="white" opacity="0.6"/>
</svg>
